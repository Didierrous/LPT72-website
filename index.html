<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 

<link rel="icon" type="image/png" href="escudo.png">
<link rel="stylesheet" href="style.css">

<title>Los Pinches Tacos 72 – Cortes y Tacos Regios</title>

<style>

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 2000;
    padding-top: 80px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.8);
}

.modal-contenido {
    margin: auto;
    display: block;
    max-width: 90%;
    max-height: 80%;
    border-radius: 10px;
}

.cerrar {
    position: absolute;
    top: 30px;
    right: 40px;
    color: #fff;
    font-size: 40px;
    cursor: pointer;
}

/* BOTONES (solo estructura, el diseño queda en tu CSS externo) */
.botones-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
    flex-wrap: wrap;
}

/* FLOATS */
.whatsapp-float, .facebook-float {
    position: fixed;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}

.whatsapp-float {
    bottom: 25px;
    right: 25px;
    background-color: #25D366;
}

.facebook-float {
    bottom: 100px;
    right: 25px;
    background-color: #1877F2;
}

/* TEL */
.telefono-float {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background-color: rgba(0,0,0,0.6);
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 20px;
    font-weight: bold;
}

/* VIDEO */
#video-fondo {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* 🔥 ARREGLO CLAVE (imagen centrada) */
.foto-perfil {
    display: block;
    margin: 20px auto;
}

</style>
</head>

<body>

<!-- VIDEO FONDO -->
<video autoplay muted loop playsinline id="video-fondo">
    <source src="fondo de fuego.mp4" type="video/mp4">
</video>

<!-- TELÉFONO -->
<a href="tel:+522222394714" class="telefono-float">
📞 222 239 4714
</a>

<!-- LOGO -->
<img src="escudo.png" class="foto-perfil">

<!-- CONTENIDO -->
<div class="caja-central">

<h1>Bienvenidos a Los Pinches Tacos 72 🌮</h1>
<h2>Donde cada mordida es una explosión de sabor 🔥</h2>

<h3>Disfruta de nuestros Tacos, Burritos, Papas Asadas y el irresistible Corte T-Bone 🥩</h3>

<div class="botones-container">
<button id="btnmenu">Menú Regio</button>
<button id="btnubicacion">Ubicación</button>
<button id="btnhorario">Horarios</button>
</div>

</div>

<!-- WHATSAPP -->
<a href="https://wa.me/522222394714" class="whatsapp-float" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35">
</a>

<!-- FACEBOOK -->
<a href="https://www.facebook.com/" class="facebook-float" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_(2019).png" width="28">
</a>

<!-- MODAL -->
<div id="modalmenu" class="modal">
<span class="cerrar">&times;</span>
<img class="modal-contenido" id="imgmenu">
</div>

<script>
const modal = document.getElementById("modalmenu");
const imgModal = document.getElementById("imgmenu");
const cerrar = document.querySelector(".cerrar");

function abrirModal(foto){
    imgModal.src = foto;
    modal.style.display = "block";
}

document.getElementById("btnmenu").onclick = () => abrirModal("nuevomenu.jpg");
document.getElementById("btnubicacion").onclick = () => abrirModal("ubicacion.png");
document.getElementById("btnhorario").onclick = () => abrirModal("nuevohorario.jpg");

cerrar.onclick = () => modal.style.display = "none";

window.onclick = function(event){
    if(event.target == modal){
        modal.style.display = "none";
    }
}
</script>

<footer>
<p>© 2026 Los Pinches Tacos 72</p>
</footer>

</body>
</html>
